name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 requests pywin32 pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "Achievement_Watcher" "achievement_watcher.py"

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AchievementWatcher
        path: dist/AchievementWatcher.exe

    - name: Upload EXE to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/AchievementWatcher.exe
